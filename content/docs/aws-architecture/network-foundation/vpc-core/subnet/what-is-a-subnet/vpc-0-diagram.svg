<svg width="100%" viewBox="0 0 760 860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      }
      .title { fill:#ffffff; font-size:18px; font-weight:700; }
      .subtitle { fill:#b8c0cc; font-size:12px; font-weight:500; }
      .label { fill:#ffffff; font-size:14px; font-weight:700; }
      .body { fill:#d1d5db; font-size:12px; font-weight:500; }
      .caption { fill:#9ca3af; font-size:12px; font-weight:500; }
      .note { fill:#cbd5e1; font-size:11px; font-weight:500; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="760" height="860" fill="#0b1220"/>

  <!-- Region -->
  <rect x="24" y="24" width="712" height="812" rx="20" fill="#141d2b" stroke="#4b5563" stroke-width="1.5"/>
  <text x="44" y="56" class="title">AWS Region (ap-northeast-2)</text>
  <text x="44" y="78" class="subtitle">A Region contains multiple Availability Zones. A VPC is created in a Region and can span multiple AZs.</text>

  <!-- AZ A -->
  <rect x="60" y="150" width="280" height="560" rx="16" fill="#23183f" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="80" y="182" class="label">Availability Zone A</text>
  <text x="80" y="204" class="subtitle">ap-northeast-2a</text>

  <!-- AZ C -->
  <rect x="420" y="150" width="280" height="560" rx="16" fill="#23183f" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="440" y="182" class="label">Availability Zone B</text>
  <text x="440" y="204" class="subtitle">ap-northeast-2b</text>

  <!-- VPC spanning across AZs -->
  <rect x="90" y="250" width="580" height="360" rx="18" fill="#0f2742" fill-opacity="0.9" stroke="#7dd3fc" stroke-width="1.8" stroke-dasharray="9 7"/>
  <text x="112" y="282" class="title">VPC (10.0.0.0/16)</text>
  <text x="112" y="304" class="subtitle">Subnets are created inside the VPC, and each subnet belongs to one specific AZ.</text>

  <!-- Public Subnet A -->
  <rect x="120" y="350" width="210" height="110" rx="12" fill="#0f3e35" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="138" y="382" class="label">Public Subnet A</text>
  <text x="138" y="404" class="body">10.0.1.0/24</text>
  <text x="138" y="432" class="body">Internet-facing infrastructure</text>

  <!-- Private Subnet A -->
  <rect x="120" y="485" width="210" height="95" rx="12" fill="#4a2417" stroke="#fdba74" stroke-width="1.5"/>
  <text x="138" y="517" class="label">Private Subnet A</text>
  <text x="138" y="539" class="body">10.0.2.0/24</text>
  <text x="138" y="562" class="body">Not directly exposed</text>

  <!-- Public Subnet B -->
  <rect x="430" y="350" width="210" height="110" rx="12" fill="#0f3e35" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="448" y="382" class="label">Public Subnet B</text>
  <text x="448" y="404" class="body">10.0.3.0/24</text>
  <text x="448" y="432" class="body">Internet-facing infrastructure</text>

  <!-- Private Subnet B -->
  <rect x="430" y="485" width="210" height="95" rx="12" fill="#4a2417" stroke="#fdba74" stroke-width="1.5"/>
  <text x="448" y="517" class="label">Private Subnet B</text>
  <text x="448" y="539" class="body">10.0.4.0/24</text>
  <text x="448" y="562" class="body">Not directly exposed</text>

  <!-- HA note -->
  <line x1="330" y1="405" x2="430" y2="405" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="6 6"/>
  <line x1="330" y1="532" x2="430" y2="532" stroke="#9ca3af" stroke-width="1.2" stroke-dasharray="6 6"/>
  <text x="380" y="650" class="subtitle" text-anchor="middle">Placing the same role in multiple AZs helps achieve High Availability.</text>

  <!-- Bottom note -->
  <rect x="44" y="752" width="672" height="64" rx="12" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="60" y="778" class="caption">Key idea: AZs belong to the Region. The VPC also belongs to the Region and can span multiple AZs.</text>
  <text x="60" y="796" class="caption">Each subnet is inside the VPC and mapped to exactly one AZ.</text>
</svg>
