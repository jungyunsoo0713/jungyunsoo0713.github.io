<svg width="100%" viewBox="0 0 900 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif; }
      .title { fill:#ffffff; font-size:20px; font-weight:700; }
      .subtitle { fill:#b8c0cc; font-size:12px; font-weight:500; }
      .label { fill:#ffffff; font-size:14px; font-weight:700; }
      .body { fill:#d1d5db; font-size:12px; font-weight:500; }
      .caption { fill:#9ca3af; font-size:12px; font-weight:500; }
      .small { fill:#cbd5e1; font-size:11px; font-weight:500; }
      .tablehead { fill:#e5e7eb; font-size:12px; font-weight:700; }
      .rttext { fill:#dbeafe; font-size:11px; font-weight:500; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="900" fill="#0b1220"/>

  <!-- Region -->
  <rect x="24" y="24" width="852" height="852" rx="20" fill="#141d2b" stroke="#4b5563" stroke-width="1.5"/>
  <text x="46" y="58" class="title">AWS Region (ap-northeast-2)</text>
  <text x="46" y="80" class="subtitle">A Region contains multiple Availability Zones. A VPC is created in a Region and can span multiple AZs.</text>

  <!-- AZs -->
  <rect x="58" y="146" width="320" height="610" rx="16" fill="#23183f" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="80" y="178" class="label">Availability Zone A</text>
  <text x="80" y="200" class="subtitle">ap-northeast-2a</text>

  <rect x="522" y="146" width="320" height="610" rx="16" fill="#23183f" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="544" y="178" class="label">Availability Zone B</text>
  <text x="544" y="200" class="subtitle">ap-northeast-2b</text>

  <!-- VPC -->
  <rect x="92" y="236" width="716" height="500" rx="18" fill="#0f2742" fill-opacity="0.92" stroke="#7dd3fc" stroke-width="1.8" stroke-dasharray="9 7"/>
  <text x="116" y="268" class="title">VPC (10.0.0.0/16)</text>
  <text x="116" y="290" class="subtitle">Subnets are created inside the VPC, and each subnet belongs to one specific AZ.</text>

  <!-- Public subnets -->
  <rect x="118" y="338" width="220" height="105" rx="12" fill="#0f3e35" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="136" y="370" class="label">Public Subnet A</text>
  <text x="136" y="392" class="body">10.0.1.0/24</text>
  <text x="136" y="420" class="body">Internet-facing resources</text>

  <rect x="562" y="338" width="220" height="105" rx="12" fill="#0f3e35" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="580" y="370" class="label">Public Subnet B</text>
  <text x="580" y="392" class="body">10.0.3.0/24</text>
  <text x="580" y="420" class="body">Internet-facing resources</text>

  <!-- Private subnets -->
  <rect x="118" y="468" width="220" height="105" rx="12" fill="#4a2417" stroke="#fdba74" stroke-width="1.5"/>
  <text x="136" y="500" class="label">Private Subnet A</text>
  <text x="136" y="522" class="body">10.0.2.0/24</text>
  <text x="136" y="550" class="body">Not directly exposed</text>

  <rect x="562" y="468" width="220" height="105" rx="12" fill="#4a2417" stroke="#fdba74" stroke-width="1.5"/>
  <text x="580" y="500" class="label">Private Subnet B</text>
  <text x="580" y="522" class="body">10.0.4.0/24</text>
  <text x="580" y="550" class="body">Not directly exposed</text>

  <!-- Route table cards -->
  <rect x="365" y="330" width="170" height="132" rx="12" fill="#13293d" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="450" y="356" class="label" text-anchor="middle">Public Route Table</text>
  <line x1="381" y1="368" x2="519" y2="368" stroke="#3b82f6" stroke-width="1"/>
  <text x="381" y="388" class="tablehead">Destination</text>
  <text x="468" y="388" class="tablehead">Target</text>
  <text x="381" y="410" class="rttext">10.0.0.0/16</text>
  <text x="468" y="410" class="rttext">local</text>
  <text x="381" y="432" class="rttext">0.0.0.0/0</text>
  <text x="468" y="432" class="rttext">IGW</text>
  <text x="450" y="450" class="small" text-anchor="middle">Associated with public subnets</text>

  <rect x="365" y="476" width="170" height="132" rx="12" fill="#3a2414" stroke="#fb923c" stroke-width="1.5"/>
  <text x="450" y="502" class="label" text-anchor="middle">Private Route Table</text>
  <line x1="381" y1="514" x2="519" y2="514" stroke="#f59e0b" stroke-width="1"/>
  <text x="381" y="534" class="tablehead">Destination</text>
  <text x="468" y="534" class="tablehead">Target</text>
  <text x="381" y="556" class="rttext">10.0.0.0/16</text>
  <text x="468" y="556" class="rttext">local</text>
  <text x="381" y="578" class="rttext">0.0.0.0/0</text>
  <text x="468" y="578" class="rttext">NAT GW</text>
  <text x="450" y="596" class="small" text-anchor="middle">Associated with private subnets</text>

  <!-- Association lines -->
  <line x1="338" y1="390" x2="365" y2="390" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <line x1="562" y1="390" x2="535" y2="390" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <line x1="338" y1="520" x2="365" y2="542" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <line x1="562" y1="520" x2="535" y2="542" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arrow)"/>

  <!-- HA lines -->
  <line x1="338" y1="390" x2="562" y2="390" stroke="#9ca3af" stroke-width="1.1" stroke-dasharray="6 6"/>
  <line x1="338" y1="520" x2="562" y2="520" stroke="#9ca3af" stroke-width="1.1" stroke-dasharray="6 6"/>

  <text x="450" y="654" class="subtitle" text-anchor="middle">The same role can be placed in multiple AZs, while each subnet is associated with a route table.</text>

  <!-- Bottom note -->
  <rect x="44" y="790" width="812" height="62" rx="12" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="62" y="816" class="caption">Key idea: A subnet belongs to one AZ, but its route table is a VPC-level construct that controls where outbound traffic goes.</text>
  <text x="62" y="834" class="caption">Public subnets usually use a route table with an IGW route. Private subnets often use a route table with a NAT gateway route.</text>
</svg>
